name: Unifi-Japan-Translate-Stable

on:
  push:
    paths:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run Stable Translation
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          set -e

          echo "===== FIND FILES ====="
          FILES=$(find . -name "*.md" \
            -not -path "./ja/*" \
            -not -path "./.git/*" \
            -not -path "./.github/*")

          echo "$FILES"

          for file in $FILES; do
            echo "Processing $file..."

            REL_PATH=${file#./}
            TARGET_FILE="ja/$REL_PATH"

            mkdir -p "$(dirname "$TARGET_FILE")"

            # 1. Front Matter 보호
            FRONT_MATTER=$(awk 'BEGIN{flag=0} /^---$/{if(flag==0){flag=1; next} else{exit}} flag==1{print}' "$file")
            BODY=$(awk 'BEGIN{flag=0} /^---$/{if(flag==0){flag=1; next} else{flag=2; next}} flag==2{print}' "$file")

            if [ -z "$FRONT_MATTER" ]; then
              BODY=$(cat "$file")
            fi

            # 2. 보호 처리 (중요)
            PROTECTED_BODY="$BODY"

            # URL 보호
            PROTECTED_BODY=$(echo "$PROTECTED_BODY" | sed -E 's|(https?://[^ ]+)|<span translate="no">\1</span>|g')

            # Markdown 링크 보호
            PROTECTED_BODY=$(echo "$PROTECTED_BODY" | sed -E 's|(!?\[[^]]*\]\([^)]*\))|<span translate="no">\1</span>|g')

            # metaLinks / alternates 보호
            PROTECTED_BODY=$(echo "$PROTECTED_BODY" | sed -E 's|\b(metaLinks|alternates)\b|<span translate="no">\1</span>|g')

            # Unifi 고유명사 보호
            PROTECTED_BODY=$(echo "$PROTECTED_BODY" | sed 's/Unifi/<span translate="no">Unifi<\/span>/g')

            # 3. DeepL 번역
            RESPONSE=$(curl -s -X POST "https://api-free.deepl.com/v2/translate" \
              -H "Authorization: DeepL-Auth-Key $DEEPL_API_KEY" \
              --data-urlencode "text=$PROTECTED_BODY" \
              -d "source_lang=EN" \
              -d "target_lang=JA" \
              -d "tag_handling=html" \
              -d "preserve_formatting=1")

            TRANSLATED_BODY=$(echo "$RESPONSE" | jq -r '.translations[0].text // empty')

            if [ -z "$TRANSLATED_BODY" ]; then
              echo "❌ Translation failed for $file"
              continue
            fi

            # 4. 후처리
            FINAL_BODY=$(echo "$TRANSLATED_BODY" | sed -E 's/<\/?span[^>]*>//g')

            # 일본어 괄호 깨짐 복구
            FINAL_BODY=$(echo "$FINAL_BODY" | sed -E 's/（/(/g' | sed -E 's/）/)/g')

            # 링크 공백 복구
            FINAL_BODY=$(echo "$FINAL_BODY" | sed -E 's/(!?\[[^]]*\]) *\(([^)]*)\)/\1(\2)/g')

            # 5. 저장
            if [ -n "$FRONT_MATTER" ]; then
              echo -e "---\n$FRONT_MATTER\n---\n\n$FINAL_BODY" > "$TARGET_FILE"
            else
              echo "$FINAL_BODY" > "$TARGET_FILE"
            fi

          done

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add ja/

          git commit -m "docs: Auto-translate EN to JA (stable)" || echo "No changes"

          git push
