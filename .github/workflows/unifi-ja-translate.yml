name: Unifi-Japan-Translate-Debug

on:
  push:
    paths:
      - "en/**/*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run Debug Translation
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          set -e

          echo "===== DEBUG START ====="

          # 1. 변경 파일 감지
          FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^en/.*\.md$' || true)

          echo "Detected FILES: $FILES"

          # fallback (중요)
          if [ -z "$FILES" ]; then
            echo "⚠️ No diff detected → fallback to all files"
            FILES=$(find en -name "*.md")
          fi

          echo "Final FILES: $FILES"

          for file in $FILES; do
            echo "-----------------------------"
            echo "Processing: $file"

            REL_PATH=${file#en/}
            TARGET_FILE="ja/$REL_PATH"
            mkdir -p "$(dirname "$TARGET_FILE")"

            # 2. Front Matter 분리
            FRONT_MATTER=$(sed -n '/^---$/,/^---$/p' "$file" | sed '1d;$d')
            BODY=$(sed '1,/^---$/d' "$file" | sed '1,/^---$/d')

            if [ -z "$FRONT_MATTER" ]; then
              BODY=$(cat "$file")
            fi

            echo "BODY length: ${#BODY}"

            # 3. 보호 처리 (최소 버전)
            PROTECTED_BODY=$(echo "$BODY" | sed -E 's/(!?\[[^]]*\]\([^)]*\))/<span translate="no">\1<\/span>/g')
            PROTECTED_BODY=$(echo "$PROTECTED_BODY" | sed -E 's#https?://[^ ]+#<span translate="no">&</span>#g')

            # 4. DeepL 호출
            RESPONSE=$(curl -s -X POST "https://api-free.deepl.com/v2/translate" \
              -H "Authorization: DeepL-Auth-Key $DEEPL_API_KEY" \
              --data-urlencode "text=$PROTECTED_BODY" \
              -d "source_lang=EN" \
              -d "target_lang=JA" \
              -d "tag_handling=html")

            echo "DeepL raw response:"
            echo "$RESPONSE"

            TRANSLATED_BODY=$(echo "$RESPONSE" | jq -r '.translations[0].text // empty')

            echo "Translated length: ${#TRANSLATED_BODY}"

            # DeepL 실패 방어 (핵심)
            if [ -z "$TRANSLATED_BODY" ]; then
              echo "❌ Translation failed → using original"
              TRANSLATED_BODY="$BODY"
            fi

            # 5. 후처리
            FINAL_BODY=$(echo "$TRANSLATED_BODY" | sed -E 's/<\/?span[^>]*>//g')
            FINAL_BODY=$(echo "$FINAL_BODY" | sed -E 's/（/(/g' | sed -E 's/）/)/g')

            echo "Saving file → $TARGET_FILE"

            # 6. 저장 (무조건 생성됨)
            if [ -n "$FRONT_MATTER" ]; then
              echo -e "---\n$FRONT_MATTER\n---\n\n$FINAL_BODY" > "$TARGET_FILE"
            else
              echo "$FINAL_BODY" > "$TARGET_FILE"
            fi
          done

          echo "===== FILE TREE ====="
          ls -R

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add ja/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: Debug auto-translate EN → JA"
            git pull --rebase origin main
            git push origin main
          fi
