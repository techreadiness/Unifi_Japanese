name: Unifi-Japan-Translate-Stable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run Stable Translation
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          set +e   # ❗ 절대 중간에 죽지 않게

          echo "===== START TRANSLATION ====="

          FILES=$(find . -name "*.md" \
            -not -path "./ja/*" \
            -not -path "./.git/*" \
            -not -path "./.github/*")

          for file in $FILES; do
            echo "Processing $file..."

            # 빈 파일 스킵
            if [ ! -s "$file" ]; then
              echo "Skip empty file"
              continue
            fi

            REL_PATH=${file#./}
            TARGET_FILE="ja/$REL_PATH"
            mkdir -p "$(dirname "$TARGET_FILE")"

            CONTENT=$(cat "$file")

            # --------------------------------
            # 🔒 보호 처리 (핵심)
            # --------------------------------

            PROTECTED=$(echo "$CONTENT" | sed -E '
              s|(https?://[^ ]+)|<span translate="no">\1</span>|g;
              s|(!?\[[^]]*\]\([^)]*\))|<span translate="no">\1</span>|g;
              s|(\|.*\|)|<span translate="no">\1</span>|g;
              s|(metaLinks|alternates)|<span translate="no">\1</span>|g;
            ')

            # --------------------------------
            # 🌍 DeepL 번역
            # --------------------------------

            RESPONSE=$(curl -s -X POST "https://api-free.deepl.com/v2/translate" \
              -H "Authorization: DeepL-Auth-Key $DEEPL_API_KEY" \
              --data-urlencode "text=$PROTECTED" \
              -d "source_lang=EN" \
              -d "target_lang=JA" \
              -d "tag_handling=html" \
              -d "preserve_formatting=1")

            TRANSLATED=$(echo "$RESPONSE" | jq -r '.translations[0].text // empty')

            # 번역 실패 시 스킵
            if [ -z "$TRANSLATED" ]; then
              echo "❌ Translation failed"
              continue
            fi

            # --------------------------------
            # 🧹 후처리
            # --------------------------------

            FINAL=$(echo "$TRANSLATED" | sed -E '
              s|</?span[^>]*>||g;
              s|（|(|g;
              s|）|)|g;
              s|(!?\[[^]]*\]) *\(([^)]*)\)|\1(\2)|g;
            ')

            echo "$FINAL" > "$TARGET_FILE"
            echo "✅ Saved -> $TARGET_FILE"

          done

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add ja/

          git diff --quiet && git diff --staged --quiet || \
          (git commit -m "docs: stable auto-translate EN → JA" && git push)
